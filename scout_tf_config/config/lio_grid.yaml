topics:
  cloud: /cloud_registered
  odometry: /Odometry
  occupancy: /omni/occupancy
  pose2d: /omni/pose2d

frames:
  map: map

sync:
  queue_size: 30
  slop_sec: 0.15

filter:
  # If true, z filter range is applied on (point.z - robot_z).
  # If false, absolute point.z is used.
  use_relative_height: true
  slice_z_min: 0.10
  slice_z_max: 0.50
  point_stride: 3
  max_points_per_scan: 8000

grid:
  resolution: 0.05
  initial_rows: 200
  initial_cols: 200
  origin_x: -5.0
  origin_y: -5.0
  grow_padding_cells: 50

  free_log_odds: -0.4
  occupied_log_odds: 0.85
  clamp_min: -6.0
  clamp_max: 6.0

  publish_hz: 2.0
  occupied_threshold: 0.65
  inflation_radius_m: 0.20
